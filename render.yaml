services:
  - type: web
    name: baltium-backend
    runtime: node
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        placeholder: Pega aquí la URL de conexión (Transaction Pooler) de Supabase
      - key: DIRECT_URL
        placeholder: Pega aquí la URL de conexión directa (Session Pooler) de Supabase
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://baltium-reservas.netlify.app
