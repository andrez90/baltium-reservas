services:
  - type: web
    name: baltium-backend
    runtime: node
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: baltium-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: baltium-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://baltium-reservas.netlify.app

databases:
  - name: baltium-db
    databaseName: baltium_reservas
    user: baltium_user
    plan: free
